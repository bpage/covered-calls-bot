services:
  - type: web
    name: covered-calls-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
